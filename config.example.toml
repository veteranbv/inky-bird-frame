[discovery]
# This location is used only to discover species. It is never rendered on a plate.
zip_code = "12345"
radius_km = 8
species_limit = 12
window = "last-week"

[controller]
workspace_dir = "."
catalog_dir = "catalog"
state_dir = "var/controller"
# Use an absolute path when a service manager does not inherit your shell PATH.
codex_path = "codex"
bind_host = "0.0.0.0"
port = 8793
references_per_species = 4
generations_per_cycle = 1
# Failed visual reviews are regenerated with their findings as corrective input.
max_generation_attempts = 3

[display_node]
controller_url = "http://controller.example:8793"
state_dir = "var/display-node"
# sequential visits the sorted active catalog, shuffle visits every active bird before
# repeating, and weighted uses local observation counts as selection weights.
rotation_mode = "shuffle"

[display]
portrait_width = 1200
portrait_height = 1600
hardware_width = 1600
hardware_height = 1200
rotation_degrees = 90

[schedule]
refresh_minutes = 15
# Generation can consume substantial Codex usage. Start conservatively.
generation_minutes = 360
rotation_minutes = 30
rotation_jitter_seconds = 0
display_startup_delay_seconds = 120
