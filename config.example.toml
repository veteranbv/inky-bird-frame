[discovery]
# Select one or more providers explicitly. iNaturalist needs no credentials, eBird provides
# nearby public sightings, and BirdWeather provides detections from one authenticated station.
# Legacy singular source values remain accepted for compatibility. See docs/discovery.md.
sources = ["inaturalist"]
# This location is used only to discover species. It is never rendered on a plate.
zip_code = "12345"
# Eight kilometers is approximately five miles: local enough to feel relevant while
# usually covering enough observations for variety. Increase it in sparsely observed areas.
radius_km = 8
# This caps the observation result set, not generation work per cycle. Fifty avoids
# truncating typical local results while keeping the active catalog intentionally bounded.
species_limit = 50
# Thirty days balances seasonal relevance with coverage. Shorter windows can be sparse;
# last-year and all-time are better suited to one-time catalog seeding.
window = "last-30-days"
# Any selection containing eBird supports the first three windows, with a maximum 50 km
# radius. Keep a real key only in this private mode-0600 file, or name an injected variable.
# ebird_api_key = "YOUR_PERSONAL_EBIRD_API_KEY"
# ebird_api_key_env = "EBIRD_API_KEY"
# Any selection containing BirdWeather accepts at most 100 species. This token authenticates one station and
# belongs only in this private file or an injected environment variable.
# birdweather_token = "YOUR_BIRDWEATHER_STATION_TOKEN"
# birdweather_token_env = "BIRDWEATHER_TOKEN"

[controller]
# Keep Codex's writable workspace separate from configuration, catalog, and state.
workspace_dir = "workspace"
catalog_dir = "catalog"
state_dir = "var/controller"
# Use an absolute path when a service manager does not inherit your shell PATH.
codex_path = "codex"
bind_host = "0.0.0.0"
port = 8793
references_per_species = 4
generations_per_cycle = 1
# Failed visual reviews are regenerated with their findings as corrective input.
max_generation_attempts = 3
# A deferred species does not consume the success quota. This separate cap limits
# how many species a cycle may inspect while looking for work that can proceed.
max_species_attempts_per_cycle = 5
retry_initial_minutes = 30
retry_max_minutes = 1440
# Licensed photos can appear later, so an insufficient set is deferred, not failed forever.
insufficient_references_retry_minutes = 10080

[research]
# Successful profiles are cached by taxon, so retries of the artwork do not research the
# species again. Five searches/day matches the default four generation cycles/day with room
# for one recovery. Raise it deliberately when generation_minutes is reduced or after seeding.
enabled = true
max_searches_per_day = 5
# Two allows one normal profile attempt and one bounded recovery for the same species.
max_searches_per_species = 2
allowed_domains = [
    "allaboutbirds.org",
    "audubon.org",
    "birdsoftheworld.org",
    "ebird.org",
    "iucnredlist.org",
    "nationalzoo.si.edu",
    "animaldiversity.org",
    "wikipedia.org",
]

[display_node]
controller_url = "http://controller.example:8793"
state_dir = "var/display-node"
# shuffle_bag is recommended: it visits every active bird once before refill and admits new
# birds immediately. sequential is stable order; shuffle refills before admitting additions;
# weighted favors frequently observed birds.
rotation_mode = "shuffle_bag"
# When BirdWeather is configured, show the newest station detection once before resuming
# rotation. Disable this to make every display update follow rotation_mode exclusively.
prioritize_latest_detection = true

[public_catalog]
# The trusted controller opens and owner-merges catalog-only PRs in this repository.
# Publishing is independent of generation and never delays the display.
enabled = false
# Clone this project repository into a writable controller-only checkout.
# checkout_dir = "var/source-repository"
# repository = "owner/inky-bird-frame"
gh_path = "gh"
remote = "origin"
base_branch = "main"
# Git commit identity only; authentication belongs in the checkout's Git configuration.
commit_name = "Inky Bird Frame Catalog"
commit_email = "inky-bird-frame@users.noreply.github.com"

[schedule]
refresh_minutes = 15
# Generation can consume substantial Codex usage. Start conservatively.
generation_minutes = 360
rotation_minutes = 30
rotation_jitter_seconds = 0
display_startup_delay_seconds = 120
catalog_publish_minutes = 5

[notifications]
# Apprise runs inside this application. No Apprise server or account is required.
enabled = false
degradation_failure_threshold = 3
degradation_window_minutes = 30
cooldown_minutes = 360
delivery_retry_minutes = 5
max_delivery_attempts = 20

# Keep real service URLs only in your private config.toml. Choose url or url_env, not both.
# Events: discovery, generation_approved, terminal_error, degraded, recovered,
# publication_error, publication_recovered.

