name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive" | sha256sum -c -
          tar -xzf "$archive" actionlint

      - name: Install ShellCheck
        env:
          SHELLCHECK_VERSION: "0.11.0"
          SHELLCHECK_SHA256: "b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6"
        run: |
          set -euo pipefail
          archive="shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.gz"
          curl -fsSLO "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/${archive}"
          printf '%s  %s\n' "$SHELLCHECK_SHA256" "$archive" | sha256sum -c -
          tar -xzf "$archive"
          echo "${PWD}/shellcheck-v${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"

      - name: Validate workflows and deployment scripts
        run: |
          set -euo pipefail
          ./actionlint -color
          shellcheck deploy/*.sh

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Validate public catalog
        run: uv run inky-bird-frame catalog validate --catalog catalog

      - name: Enforce add-only catalog contributions
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          base_directory="$(mktemp -d)"
          trap 'rm -rf "$base_directory"' EXIT
          git archive "$BASE_SHA" catalog | tar -x -C "$base_directory"
          uv run inky-bird-frame catalog validate \
            --catalog catalog \
            --base-catalog "$base_directory/catalog"

      - name: Enforce workflow action pinning
        run: uv run python .github/scripts/check_workflow_pinning.py .github/workflows

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Validate Compose configuration
        run: |
          set -euo pipefail
          env_file="$(mktemp)"
          compose_json="$(mktemp)"
          trap 'rm -f "$env_file" "$compose_json"' EXIT
          printf '%s\n' 'SECRET_BOUNDARY_SENTINEL=present' > "$env_file"
          INKY_BIRD_ENV="$env_file" docker compose config --format json > "$compose_json"
          jq -e '
            .services.scheduler.environment.SECRET_BOUNDARY_SENTINEL == "present"
            and (.services.controller.environment.SECRET_BOUNDARY_SENTINEL == null)
            and (.services.bootstrap.environment.SECRET_BOUNDARY_SENTINEL == null)
            and (.services.scheduler.security_opt | index("seccomp=unconfined") != null)
            and (.services.scheduler.security_opt | index("apparmor=unconfined") != null)
            and (.services.scheduler.security_opt | index("no-new-privileges:true") != null)
            and (.services.scheduler.cap_drop == ["ALL"])
            and (.services.scheduler.cap_add == null)
            and (.services.controller.security_opt | index("seccomp=unconfined") == null)
            and (.services.controller.security_opt | index("apparmor=unconfined") == null)
            and (.services.bootstrap.security_opt | index("seccomp=unconfined") == null)
            and (.services.bootstrap.security_opt | index("apparmor=unconfined") == null)
          ' "$compose_json"

      - name: Build controller container
        run: |
          sudo install -m 0644 deploy/apparmor/inky-bird-frame-codex /etc/apparmor.d/inky-bird-frame-codex
          sudo apparmor_parser -r /etc/apparmor.d/inky-bird-frame-codex
          if [[ -r /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            test "$(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns)" = "1"
          fi
          docker build --tag inky-bird-frame:ci .

      - name: Smoke-test controller container
        run: |
          set -euo pipefail
          config_volume="inky-bird-frame-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'docker volume rm --force "$config_volume"' EXIT
          docker volume create "$config_volume"
          docker run --rm inky-bird-frame:ci --help
          docker run --rm --entrypoint codex inky-bird-frame:ci --version
          docker run --rm --read-only --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            --pids-limit 256 \
            --tmpfs /tmp:size=256m,mode=1777 \
            --tmpfs /data:uid=10001,gid=10001 \
            --tmpfs /home/inky/.codex:uid=10001,gid=10001 \
            --entrypoint codex inky-bird-frame:ci sandbox -- /bin/true
          docker run --rm --entrypoint gh inky-bird-frame:ci --version
          docker run --rm inky-bird-frame:ci catalog validate --catalog /app/catalog
          docker run --rm --interactive \
            --volume "$config_volume:/data" \
            inky-bird-frame:ci config install --destination /data/config.toml \
            < config.example.toml
          docker run --rm \
            --volume "$config_volume:/data" \
            inky-bird-frame:ci config validate --config /data/config.toml
