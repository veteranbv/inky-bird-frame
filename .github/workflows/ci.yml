name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive" | sha256sum -c -
          tar -xzf "$archive" actionlint

      - name: Install ShellCheck
        env:
          SHELLCHECK_VERSION: "0.11.0"
          SHELLCHECK_SHA256: "b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6"
        run: |
          set -euo pipefail
          archive="shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.gz"
          curl -fsSLO "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/${archive}"
          printf '%s  %s\n' "$SHELLCHECK_SHA256" "$archive" | sha256sum -c -
          tar -xzf "$archive"
          echo "${PWD}/shellcheck-v${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"

      - name: Validate workflows and deployment scripts
        run: |
          set -euo pipefail
          ./actionlint -color
          shellcheck deploy/*.sh

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Validate public catalog
        run: uv run inky-bird-frame catalog validate --catalog catalog

      - name: Enforce add-only catalog contributions
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          base_directory="$(mktemp -d)"
          trap 'rm -rf "$base_directory"' EXIT
          git archive "$BASE_SHA" catalog | tar -x -C "$base_directory"
          uv run inky-bird-frame catalog validate \
            --catalog catalog \
            --base-catalog "$base_directory/catalog"

      - name: Enforce workflow action pinning
        run: uv run python .github/scripts/check_workflow_pinning.py .github/workflows

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest
