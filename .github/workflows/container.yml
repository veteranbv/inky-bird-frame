name: publish controller container

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Container tag to publish
        required: true
        default: latest
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: controller-container-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor == github.repository_owner && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Validate image tag
        id: image
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ ! "$REQUESTED_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid container tag" >&2
            exit 1
          fi
          echo "name=ghcr.io/${REPOSITORY}:${REQUESTED_TAG}" >> "$GITHUB_OUTPUT"
          echo "created=$(git show --no-patch --format=%cI "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.image.outputs.created }}
          provenance: mode=max
          sbom: true
