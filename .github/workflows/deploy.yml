name: deploy

on:
  workflow_dispatch:
    inputs:
      deploy_display_node:
        description: Deploy and refresh the display node
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.actor == github.repository_owner && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS, ARM64, inky-bird-controller]
    timeout-minutes: 30
    steps:
      - name: Checkout trusted main revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install controller revision and services
        env:
          # The launchd runner has a system-only PATH; uv is installed by Homebrew.
          UV_BIN: /opt/homebrew/bin/uv
        run: ./deploy/install-controller.sh

      - name: Deploy display node
        if: inputs.deploy_display_node
        run: |
          set -euo pipefail
          deployment_env="$HOME/Library/Application Support/Inky Bird Frame/deployment.env"
          test -f "$deployment_env"
          set -a
          # Deployment details are intentionally machine-local.
          # shellcheck disable=SC1090
          source "$deployment_env"
          set +a
          ./deploy/install-display-node.sh
